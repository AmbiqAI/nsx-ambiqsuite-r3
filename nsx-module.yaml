schema_version: 1

module:
  name: nsx-ambiqsuite-r3
  type: sdk_provider
  category: sdk_provider
  provider: ambiqsuite-r3
  version: "0.1.0"

support:
  ambiqsuite: true
  zephyr: false

build:
  cmake:
    package: nsx_soc_apollo3p
    targets:
      - nsx::sdk_ambiqsuite_r3

depends:
  required: []
  optional: []

compatibility:
  boards:
    - apollo3_evb
    - apollo3_evb_cygnus
    - apollo3p_evb
    - apollo3p_evb_cygnus
  socs:
    - apollo3
    - apollo3p
  toolchains:
    - arm-none-eabi-gcc
